name: Build & Publish TTM Dashboard (GitHub-only)

on:
  workflow_dispatch:
    inputs:
      owners_repos:
        description: "Liste owner/repo séparée par des espaces (ex: codegouvfr/react-dsfr)"
        required: true
        default: "codegouvfr/react-dsfr"
      months:
        description: "Période d'analyse en mois"
        required: true
        default: "12"
  schedule:
    - cron: "17 3 * * 1"  # Tous les lundis 03:17 UTC

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          npm init -y
          npm i @octokit/graphql dayjs

      - name: Compute metrics (GraphQL GitHub) & write JSON
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          OWNERS_REPOS: ${{ github.event.inputs.owners_repos }}
          MONTHS: ${{ github.event.inputs.months }}
        run: |
          mkdir -p site/data
          node <<'NODE'
          const { graphql } = require("@octokit/graphql");
          const dayjs = require("dayjs");
          const months = parseInt(process.env.MONTHS || "12", 10);
          const sinceISO = dayjs().subtract(months, "month").toISOString();
          const repos = (process.env.OWNERS_REPOS || "codegouvfr/react-dsfr").split(/\s+/).filter(Boolean);
          const gh = graphql.defaults({ headers: { authorization: `token ${process.env.GH_TOKEN}` }});
          const q = `
            query($owner:String!, $name:String!, $cursor:String){
              repository(owner:$owner, name:$name){
                pullRequests(first:100, after:$cursor, states:MERGED, orderBy:{field:UPDATED_AT, direction:DESC}){
                  pageInfo{ hasNextPage endCursor }
                  nodes{ number createdAt mergedAt isDraft }
                }
              }
            }`;

          async function fetchMerged(owner, name){
            let rows=[], cursor=null;
            while(true){
              const r=await gh(q,{owner,name,cursor});
              const pr=r.repository?.pullRequests?.nodes??[];
              rows.push(...pr);
              const pi=r.repository?.pullRequests?.pageInfo;
              if(!pi?.hasNextPage) break;
              cursor=pi.endCursor;
              if(rows.length>4000) break;
            }
            return rows.filter(x=>x.mergedAt && x.createdAt && !x.isDraft && dayjs(x.mergedAt).isAfter(sinceISO))
                       .map(x=>({ createdAt:x.createdAt, mergedAt:x.mergedAt, days:(new Date(x.mergedAt)-new Date(x.createdAt))/86400000 }));
          }

          function stats(arr){
            const s=[...arr].sort((a,b)=>a-b);
            const n=s.length, sum=s.reduce((x,y)=>x+y,0);
            const median = n ? s[Math.floor(n/2)] : 0;
            const p90    = n ? s[Math.floor(n*0.90)] : 0;
            const mean   = n ? sum/n : 0;
            return { n, median, mean, p90 };
          }

          (async ()=>{
            const projects=[];
            for(const full of repos){
              const [owner,name]=full.split("/");
              const items = await fetchMerged(owner,name);
              const byMonth={};
              for(const it of items){
                const m = dayjs(it.mergedAt).format("YYYY-MM");
                (byMonth[m]??=[]).push(it.days);
              }
              const monthly = Object.keys(byMonth).sort().map(m=>({ month:m, ...stats(byMonth[m]) }));
              projects.push({ repo:`${owner}/${name}`, since: sinceISO, overall: stats(items.map(x=>x.days)), monthly });
            }
            const fs=require("fs");
            fs.mkdirSync("site/data",{recursive:true});
            fs.writeFileSync("site/data/ttm.json", JSON.stringify({
              generatedAt: new Date().toISOString(),
              periodSince: sinceISO,
              projects
            }, null, 2));
          })().catch(e=>{ console.error(e); process.exit(1); });
          NODE

      - name: Generate static dashboard (index.html)
        run: |
          mkdir -p site
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="fr">
          <head>
            <meta charset="utf-8"/>
            <meta name="viewport" content="width=device-width,initial-scale=1"/>
            <title>PR Time‑to‑Merge — Dashboard</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
            <style>
              body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Helvetica,Arial,sans-serif;margin:24px}
              h1{margin:0 0 8px}
              .grid{display:grid;grid-template-columns:1fr;gap:24px}
              table{border-collapse:collapse;width:100%}
              th,td{padding:8px 10px;border-bottom:1px solid #eee;text-align:right}
              th:first-child,td:first-child{text-align:left}
              .kpi{display:flex;gap:16px;flex-wrap:wrap}
              .card{padding:12px 16px;border:1px solid #e5e7eb;border-radius:12px}
              .small{color:#6b7280}
              .section{margin-top:24px}
            </style>
          </head>
          <body>
            <h1>PR Time‑to‑Merge (TTM)</h1>
            <div id="meta" class="small"></div>
            <div id="content"></div>

            <script>
              (async function(){
                const r = await fetch("./data/ttm.json");
                const d = await r.json();
                document.getElementById("meta").textContent =
                  `Généré le ${new Date(d.generatedAt).toLocaleString()} • Période depuis ${new Date(d.periodSince).toLocaleDateString()}`;
                const root = document.getElementById("content");
                d.projects.forEach(p=>{
                  const sec = document.createElement("div");
                  sec.className = "section";
                  sec.innerHTML = `<h2>${p.repo}</h2>
                    <div class="kpi">
                      <div class="card"><b>Médiane</b>: ${(p.overall.median||0).toFixed(1)} j</div>
                      <div class="card"><b>Moyenne</b>: ${(p.overall.mean||0).toFixed(1)} j</div>
                      <div class="card"><b>p90</b>: ${(p.overall.p90||0).toFixed(1)} j</div>
                      <div class="card"><b>PR</b>: ${p.overall.n||0}</div>
                    </div>`;
                  const labels = p.monthly.map(m=>m.month);
                  const mMed   = p.monthly.map(m=>m.median);
                  const mMean  = p.monthly.map(m=>m.mean);
                  const mP90   = p.monthly.map(m=>m.p90);

                  const canvas = document.createElement("canvas");
                  sec.appendChild(canvas);
                  new Chart(canvas, {
                    type: "line",
                    data: {
                      labels,
                      datasets: [
                        { label: "Médiane (j)", data: mMed,  borderColor: "#2563eb", tension: .2 },
                        { label: "Moyenne (j)", data: mMean, borderColor: "#10b981", tension: .2 },
                        { label: "p90 (j)",     data: mP90,  borderColor: "#f59e0b", tension: .2 }
                      ]
                    },
                    options: { responsive: true, scales: { y: { beginAtZero:true, title:{display:true, text:"jours"} } } }
                  });

                  const tbl = document.createElement("table");
                  tbl.innerHTML = `<thead><tr><th>Mois</th><th>PR</th><th>Médiane (j)</th><th>Moyenne (j)</th><th>p90 (j)</th></tr></thead><tbody></tbody>`;
                  const tbody = tbl.querySelector("tbody");
                  p.monthly.forEach(m=>{
                    const tr=document.createElement("tr");
                    tr.innerHTML = `<td>${m.month}</td><td>${m.n}</td><td>${m.median.toFixed(1)}</td><td>${m.mean.toFixed(1)}</td><td>${m.p90.toFixed(1)}</td>`;
                    tbody.appendChild(tr);
                  });
                  sec.appendChild(tbl);
                  root.appendChild(sec);
                });
              })();
            </script>
          </body>
          </html>
          HTML

      - name: Configure Pages (official)
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (official)
        id: deployment
        uses: actions/deploy-pages@v4
``
